<!DOCTYPE html>
<html>
<link rel="icon" type="image/jpg" href="/public/favicon12(1).jpg">

<head>
    <title>Meet the Evos | CR Evolutions Guide</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cr-blue-dark: #232a4e;
            --cr-gold: #FFE66D;
            --cr-red: #8d1d2a;
            --text-light: #ffffff;
            --cr-dark-bg: #1a1e34;
            --cr-bright-blue: #323d6a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--cr-dark-bg);
            color: var(--text-light);
            min-height: 100vh;
        }

        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://cdn.discordapp.com/attachments/1407934911133777952/1448305000152563804/image.png') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
        }

        .navbar {
            background-color: var(--cr-blue-dark);
            border-bottom: 5px solid var(--cr-gold);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .nav-logo {
            font-size: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
        }

        .nav-logo span {
            color: var(--cr-gold);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            text-transform: uppercase;
            margin-right: auto;
            margin-left: 50px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 700;
            font-size: 18px;
            padding: 5px 0;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--cr-gold);
            border-bottom: 2px solid var(--cr-gold);
        }

        .navbar-icon {
            max-width: 120px;
            height: auto;
            position: relative;
            top: -10px;
        }

        .content-wrapper {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px 20px 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-grid-container {
            max-width: 1400px;
            width: 100%;
            background-color: rgba(35, 42, 78, 0.9);
            border-radius: 10px;
            border: 8px solid var(--cr-bright-blue);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            padding: 40px 20px 60px 20px;
        }

        .card-heading {
            font-family: 'Montserrat', sans-serif;
            font-size: 50px;
            font-weight: 900;
            color: var(--cr-gold);
            text-transform: uppercase;
            margin-top: 50px;
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--cr-gold);
            display: inline-block;
        }

        .page-subheading {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 50px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0;
        }

        .evo-card-link {
            text-decoration: none;
            color: inherit;
        }

        .evo-card {
            background-color: var(--cr-blue-dark);
            border: 3px solid var(--cr-gold);
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.6);
            padding: 10px;
            position: relative;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        .evo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 230, 109, 0.3);
        }

        .card-image-wrapper {
            background-color: var(--cr-bright-blue);
            border-radius: 8px;
            margin-bottom: 10px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--text-light);
            text-transform: uppercase;
            margin: 0 0 5px 0;
        }

        .card-ability {
            font-size: 14px;
            line-height: 1.4;
            color: #ccc;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .card-cycle-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background-color: var(--cr-gold);
            color: var(--cr-blue-dark);
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .card-elixir-cost {
            font-size: 18px;
            font-weight: 700;
            color: var(--cr-red);
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="page-background"></div>

    <nav class="navbar">
        <div class="nav-logo">CLASH ROYALE <span>EVOS GUIDE</span></div>
        <div class="nav-links">
            <a href="MainHub.html">HOME</a>
            <a href="MeetTheEvos.html">EVO CARDS</a>
            <a href="ClashGuide.html">GUIDE</a>
            <a href="https://clashroyale.com/" target="_blank">OFFICIAL WEB</a>
            <a href="references.html">REFERENCES</a>
        </div>
        <img src="/public/favicon12(1).jpg"
            alt="CR Skeleton Icon" class="navbar-icon">
    </nav>

    <div class="content-wrapper">
        <div class="card-grid-container">
            <h2 class="card-heading">MEET THE EVOS</h2>
            <p class="page-subheading">A detailed look at every evolved card's unique ability and cycle requirements.
            </p>
            <div class="card-grid" id="card-grid"></div>
        </div>
    </div>

    <script>
        const cardData = [
            { name: "Evolved Barbarians", elixirCost: 5, cycles: 1, ability: "Barbs temporarily gain 35% faster attack/movement speed every time they attack, lasting for 3 seconds.", image: "https://static0.dualshockersimages.com/wordpress/wp-content/uploads/2023/06/barbarians-evolved.jpg" },
            { name: "Evolved Royal Giant", elixirCost: 6, cycles: 1, ability: "Whenever RG attacks, he creates a 2.5 tile radius shockwave that deals low damage and slight knockback.", image: "https://gamingonphone.com/wp-content/uploads/2023/06/Clash-Royale-Royal-Giant-Evolution-Challenge.jpg" },
            { name: "Evolved Firecracker", elixirCost: 3, cycles: 2, ability: "Firecracker's rockets split into sparks, dealing very low tick damage and slowing movement by 15%.", image: "https://gamingonphone.com/wp-content/uploads/2023/06/FyGU_z3XsAASZEo.jpg" },
            { name: "Evolved Skeletons", elixirCost: 1, cycles: 2, ability: "Every time a Skelly attacks, another one spawns nearby. Limited to 8 Skellies maximum.", image: "https://static0.dualshockersimages.com/wordpress/wp-content/uploads/2023/07/skeletons-evolution.jpg?w=1200&h=628&fit=crop" },
            { name: "Evolved Mortar", elixirCost: 4, cycles: 2, ability: "A singular Goblin spawns when one of Mortar's boulders connect.", image: "https://pbs.twimg.com/media/FzyeWNuWIAEHkOl.jpg" },
            { name: "Evolved Knight", elixirCost: 3, cycles: 2, ability: "As long as Knight is moving/deploying, all damage that he takes is reduced by 50%.", image: "https://gamingonphone.com/wp-content/uploads/2023/08/clash-royale-knightly-armor-challenge.jpg" },
            { name: "Evolved Royal Recruits", elixirCost: 7, cycles: 1, ability: "The Recruits are able to charge when their shields are knocked off, heavily increasing speed.", image: "https://cdna.artstation.com/p/assets/images/images/067/587/616/large/mykhail-klymenko-ocellus-services-04.jpg?1695733120" },
            { name: "Evolved Bats", elixirCost: 2, cycles: 2, ability: "Each of the Bats are able to heal at a rate of 2 pulses per second.", image: "https://preview.redd.it/evolved-bats-are-the-greatest-and-most-balanced-evolution-v0-enbebje3l5bd1.jpeg?auto=webp&s=d508e1a14d08871261a28dac9d934ccec3a46847" },
            { name: "Evolved Archers", elixirCost: 3, cycles: 2, ability: "Both Archers can deal 50% bonus damage to an enemy troop if they are far away.", image: "https://gamingonphone.com/wp-content/uploads/2025/04/Clash-Royale-Archers-Evolution.jpg" },
            { name: "Evolved Ice Spirit", elixirCost: 1, cycles: 2, ability: "Once frozen, after a few seconds, the area around that troop is frozen again.", image: "https://prod.assets.earlygamecdn.com/images/IceSpiritEvo.jpg?mtime=1701348956" },
            { name: "Evolved Valkyrie", elixirCost: 4, cycles: 2, ability: "Valkyrie summons a tornado upon attacking, pulling in all troops within 5.5 tiles.", image: "https://gamingonphone.com/wp-content/uploads/2025/03/Clash-Royale-Valkyrie-Evolution-decks.jpg" },
            { name: "Evolved Bomber", elixirCost: 2, cycles: 2, ability: "The bomb bounces twice after it lands. The bomb cannot hit the same troop twice.", image: "https://cdnb.artstation.com/p/assets/images/images/073/433/119/large/mooncolony-key-art-template-artstation-bomberevo.jpg?1709650354" }
        ];

        function renderEvoCards() {
            const gridContainer = document.getElementById('card-grid');
            if (!gridContainer) return;

            gridContainer.innerHTML = cardData.map((card, index) => {
                const fileNumber = index + 1;
                const filename = `EvoCard${fileNumber}.html`;

                return ` 
                    <a href="${filename}" class="evo-card-link">
                        <div class="evo-card">
                            <div class="card-cycle-badge">${card.cycles} ${card.cycles === 1 ? 'CYCLE' : 'CYCLES'}</div>
                            <div class="card-image-wrapper">
                                <img src="${card.image}" alt="${card.name}">
                            </div>
                            <h3 class="card-title">${card.name}</h3>
                            <p class="card-ability">${card.ability}</p>
                            <p class="card-elixir-cost">Elixir Cost: ${card.elixirCost}</p>
                        </div>
                    </a>
                `;
            }).join('');
        }
        document.addEventListener('DOMContentLoaded', renderEvoCards);
    </script>
</body>

</html>
